repos:
  - repo: local
    hooks:
      - id: sensitive-content-files
        name: block sensitive customer identifiers in tracked content
        entry: python scripts/check_sensitive_content.py
        language: system
        types: [text]
      - id: sensitive-content-commit-msg
        name: block sensitive customer identifiers in commit messages
        entry: python scripts/check_sensitive_content.py --commit-msg-file
        language: system
        stages: [commit-msg]
        pass_filenames: true
        always_run: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/asottile/reorder-python-imports
    rev: v3.16.0
    hooks:
      - id: reorder-python-imports
        exclude: ^forward_netbox/utilities/merge\.py$
  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black
  - repo: https://github.com/google/yamlfmt
    rev: v0.20.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
