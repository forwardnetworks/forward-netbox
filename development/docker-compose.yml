services:
  netbox: &netbox
    depends_on:
      - postgres
      - redis
    ports:
      - "${FORWARD_NETBOX_HOST_PORT:-8000}:8000"
    env_file: env/netbox.env
    environment:
      NETBOX_VER: "${NETBOX_VER:-v4.6.5}"
    secrets:
      - api_token_pepper_1
      - db_password
      - redis_password
      - source: redis_password
        target: redis_cache_password
      - secret_key
    healthcheck:
      start_period: 5s
      timeout: 3s
      interval: 5s
      # Fresh environments can take longer than 180s.
      # Reason: full NetBox/plugin migrations on first boot.
      retries: 120
      test: "curl -f http://localhost:8000/login/ || exit 1"
    volumes:
      - ./configuration:/etc/netbox/config:ro
      - ../:/source
      - ./logs:/var/log/netbox
    build:
      context: ../
      dockerfile: development/Dockerfile
      args:
        NETBOX_VER: "${NETBOX_VER:-v4.6.5}"
  netbox-worker:
    !!merge <<: *netbox
    depends_on:
      netbox:
        condition: service_healthy
    ports: []
    command:
      - sh
      - -lc
      - |
        if [ "${FORWARD_NETBOX_WORKER_AUTORELOAD:-1}" = "1" ]; then
          exec /opt/netbox/venv/bin/watchmedo auto-restart \
            --directory=/source \
            --pattern='*.py' \
            --recursive \
            -- /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker
        fi
        exec /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker
    deploy:
      mode: replicated
      replicas: 2
    healthcheck:
      start_period: 10s
      timeout: 3s
      interval: 10s
      test: "ps -aux | grep -v grep | grep -q rqworker || exit 1"
  postgres:
    image: postgres:16-alpine
    shm_size: ${FORWARD_NETBOX_POSTGRES_SHM_SIZE:-1gb}
    env_file: env/postgres.env
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - ${FORWARD_NETBOX_POSTGRES_DATA_PATH:-netbox-postgres-data}:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    command:
      - sh
      - -ec
      - |
        umask 077
        password="$$(cat /run/secrets/redis_password)"
        printf 'appendonly yes\nrequirepass %s\n' "$$password" > /tmp/redis.conf
        unset password
        exec redis-server /tmp/redis.conf
    secrets:
      - redis_password
secrets:
  api_token_pepper_1:
    file: ./secrets/api_token_pepper_1
  db_password:
    file: ./secrets/db_password
  redis_password:
    file: ./secrets/redis_password
  secret_key:
    file: ./secrets/secret_key
volumes:
  netbox-postgres-data:
    driver: local
