services:
  netbox: &netbox
    depends_on:
      - postgres
      - redis
    ports:
      - "${FORWARD_NETBOX_HOST_PORT:-8000}:8000"
    env_file: env/netbox.env
    environment:
      NETBOX_VER: "${NETBOX_VER}"
      FORWARD_NETBOX_FETCH_ARTIFACT_DIR: "/fetch-artifacts"
      FORWARD_NETBOX_FETCH_ARTIFACT_TTL_SECONDS: "86400"
      FORWARD_NETBOX_FETCH_ARTIFACT_MAX_BYTES: "536870912"
    healthcheck:
      start_period: 5s
      timeout: 3s
      interval: 5s
      # Fresh environments can take longer than 180s.
      # Reason: full NetBox/plugin migrations on first boot.
      retries: 120
      test: "curl -f http://localhost:8000/api/ || exit 1"
    volumes:
      - ./configuration:/etc/netbox/config:ro
      - ../:/source
      - ./logs:/var/log/netbox
      - type: bind
        source: ${FORWARD_NETBOX_FETCH_ARTIFACT_HOST_PATH:-./fetch-artifacts}
        target: /fetch-artifacts
    build:
      context: ../
      dockerfile: development/Dockerfile
      args:
        NETBOX_VER: "${NETBOX_VER}"
  netbox-worker:
    !!merge <<: *netbox
    depends_on:
      netbox:
        condition: service_healthy
    ports: []
    command:
      - sh
      - -lc
      - |
        if [ "${FORWARD_NETBOX_WORKER_AUTORELOAD:-1}" = "1" ]; then
          exec /opt/netbox/venv/bin/watchmedo auto-restart \
            --directory=/source \
            --pattern='*.py' \
            --recursive \
            -- /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker
        fi
        exec /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker
    deploy:
      mode: replicated
      replicas: 2
    healthcheck:
      start_period: 10s
      timeout: 3s
      interval: 10s
      test: "ps -aux | grep -v grep | grep -q rqworker || exit 1"
  postgres:
    image: postgres:16-alpine
    env_file: env/postgres.env
    volumes:
      - ${FORWARD_NETBOX_POSTGRES_DATA_PATH:-netbox-postgres-data}:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    command:
      - sh
      - -c # this is to evaluate the $REDIS_PASSWORD from the env
      - redis-server --appendonly yes --requirepass $$REDIS_PASSWORD # yamllint disable-line rule:line-length
    env_file: env/redis.env
volumes:
  netbox-postgres-data:
    driver: local
