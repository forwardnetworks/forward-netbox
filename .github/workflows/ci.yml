name: CI
"on":
  push:
  pull_request:
permissions:
  contents: read
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  validate:
    name: Validate NetBox ${{ matrix.netbox-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        netbox-version:
          - v4.6.3
    env:
      NETBOX_VER: ${{ matrix.netbox-version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check commit history for sensitive content
        run: python scripts/check_sensitive_content.py --all-history
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            build \
            invoke \
            python-dotenv \
            pre-commit \
            mkdocs \
            mkdocs-material \
            mkdocs-awesome-pages-plugin \
            mdx-truly-sane-lists \
            pymdown-extensions
      - name: Run pre-commit
        run: pre-commit run --all-files
      - name: Check repository harness
        run: python scripts/check_harness.py
      - name: Run harness tests
        run: python -m unittest discover -s scripts/tests -p 'test_*.py'
      - name: Compile plugin modules
        run: python -m py_compile $(find forward_netbox -name '*.py' -print)
      - name: Build docs
        run: mkdocs build --strict
      - name: Build NetBox development image
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            build netbox
      - name: Start NetBox data services
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            up -d postgres redis
      - name: Run NetBox database migrations
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            run --rm --no-deps netbox bash -lc \
            "cd /opt/netbox/netbox && python manage.py migrate --noinput"
      - name: Start NetBox web service
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            up -d --wait netbox
      - name: Run Django system checks
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            exec -T netbox bash -lc \
            "cd /opt/netbox/netbox && python manage.py check"
      - name: Run synthetic scenario tests
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            exec -T netbox bash -lc \
            "cd /opt/netbox/netbox && \
            python manage.py test --keepdb --noinput \
            forward_netbox.tests.test_synthetic_scenarios"
      - name: Run plugin tests
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            exec -T netbox bash -lc \
            "cd /opt/netbox/netbox && \
            python manage.py test --keepdb --noinput forward_netbox.tests"
      - name: Validate validation-org query sync
        env:
          VAL_SRC: ${{ secrets.FORWARD_VALIDATION_SOURCE_NAME }}
          FORWARD_VALIDATION_URL: ${{ secrets.FORWARD_VALIDATION_URL }}
          VAL_USER: ${{ secrets.FORWARD_VALIDATION_USERNAME }}
          VAL_PASS: ${{ secrets.FORWARD_VALIDATION_PASSWORD }}
          VAL_NETID: ${{ secrets.FORWARD_VALIDATION_NETWORK_ID }}
        if: >-
          env.VAL_USER != '' && env.VAL_PASS != '' && env.VAL_NETID != ''
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            exec -T netbox bash -lc \
            "cd /opt/netbox/netbox && \
            source_name=\"${VAL_SRC:-validation-source}\" && \
            validation_url=\"${FORWARD_VALIDATION_URL:-https://fwd.app}\" && \
            python manage.py forward_validation_org_query_audit \
            --source-name \"${source_name}\" \
            --url \"${validation_url}\" \
            --username \"${VAL_USER}\" \
            --password \"${VAL_PASS}\" \
            --network-id \"${VAL_NETID}\" \
            --repository org \
            --directory /forward_netbox_validation/ \
            --fail-on-gap"
      - name: Build release artifacts
        run: python -m build
      - name: Show container logs on failure
        if: failure()
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            logs --no-color netbox
          docker compose --project-name forward-netbox \
            --project-directory development \
            logs --no-color netbox-worker
      - name: Stop NetBox development stack
        if: always()
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            down -v
