name: CI
"on":
  push:
  pull_request:
permissions:
  contents: read
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  validate:
    name: Validate NetBox ${{ matrix.netbox-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # Validate the exact minimum and shipped NetBox patch.
        netbox-version:
          - v4.6.5
    env:
      NETBOX_VER: ${{ matrix.netbox-version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - name: Check commit history for sensitive content
        env:
          # Customer identifiers to block are injected from a repo secret so
          # they are never committed; see scripts/sensitive_content.py.
          FORWARD_SENSITIVE_PATTERNS: ${{ secrets.FORWARD_SENSITIVE_PATTERNS }}
          FORWARD_SENSITIVE_BINARY_HISTORY_ALLOWLIST: >-
            ${{ secrets.FORWARD_SENSITIVE_BINARY_HISTORY_ALLOWLIST }}
          FORWARD_SENSITIVE_HISTORY_BASELINE: >-
            ${{ vars.FORWARD_SENSITIVE_HISTORY_BASELINE }}
        run: |
          python scripts/check_sensitive_content.py --protected-history \
            --require-baseline-env
      - name: Check tracked file content for sensitive content
        env:
          # Scans the CONTENT of every tracked file (not just commit
          # messages) against the same secret, so a customer name in a doc
          # or test cannot slip past the message-only history scan. Set the
          # secret with word-boundary regex for short tokens, e.g.
          # `re:\bExampleCustomer\b`, to avoid substring false positives.
          FORWARD_SENSITIVE_PATTERNS: ${{ secrets.FORWARD_SENSITIVE_PATTERNS }}
          FORWARD_SENSITIVE_BINARY_HISTORY_ALLOWLIST: >-
            ${{ secrets.FORWARD_SENSITIVE_BINARY_HISTORY_ALLOWLIST }}
        run: python scripts/check_sensitive_content.py --git-files
      - name: Require protected sensitive-content configuration
        if: github.event_name == 'push'
        env:
          FORWARD_SENSITIVE_PATTERNS: ${{ secrets.FORWARD_SENSITIVE_PATTERNS }}
          FORWARD_SENSITIVE_BINARY_HISTORY_ALLOWLIST: >-
            ${{ secrets.FORWARD_SENSITIVE_BINARY_HISTORY_ALLOWLIST }}
          FORWARD_SENSITIVE_HISTORY_BASELINE: >-
            ${{ vars.FORWARD_SENSITIVE_HISTORY_BASELINE }}
        run: |
          python scripts/check_sensitive_content.py --git-files \
            --protected-history --require-env-patterns --require-baseline-env
      - name: Install validation dependencies
        run: |
          python -m pip install --require-hashes \
            --requirement requirements-release.txt
      - name: Audit dependencies for known vulnerabilities (pip-audit)
        # A release candidate with a known vulnerable pinned dependency fails
        # closed. Dependabot remains the continuous update source.
        run: pip-audit --progress-spinner off -r constraints.txt
      - name: Run pre-commit
        run: pre-commit run --all-files
      - name: Check repository harness
        # Dependabot cannot carry a plan document. Every human-authored push
        # and PR runs the repository invariants and changed-file plan gate.
        if: github.actor != 'dependabot[bot]'
        run: python scripts/check_harness.py
      - name: Run harness tests
        run: python -m unittest discover -s scripts/tests -p 'test_*.py'
      - name: Compile plugin modules
        run: python -m py_compile $(find forward_netbox -name '*.py' -print)
      - name: Build docs
        run: mkdocs build --strict
      - name: Generate isolated development secrets
        run: python scripts/generate_development_secrets.py
      - name: Build NetBox development image
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            build netbox
      - name: Start NetBox data services
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            up -d postgres redis
      - name: Run NetBox database migrations
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            run --rm --no-deps netbox bash -lc \
            "cd /opt/netbox/netbox && python manage.py migrate --noinput"
      - name: Check for missing plugin migrations (model drift)
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            run --rm --no-deps netbox bash -lc \
            "cd /opt/netbox/netbox && \
            python manage.py makemigrations --check --dry-run forward_netbox"
      - name: Start NetBox web service
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            up -d --wait netbox
      - name: Run Django system checks
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            exec -T netbox bash -lc \
            "cd /opt/netbox/netbox && python manage.py check"
      - name: Run synthetic scenario tests
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            exec -T netbox bash -lc \
            "cd /opt/netbox/netbox && \
            python manage.py test --keepdb --noinput \
            forward_netbox.tests.test_bulk_merge.BulkMergeIntegrationTest \
            forward_netbox.tests.test_bulk_merge.SingleBranchExecutorTest \
            forward_netbox.tests.test_stuck_recovery.StuckRecoveryTest"
      - name: Run plugin tests (with coverage)
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            exec -T netbox bash -lc \
            "cd /opt/netbox/netbox && \
            python -m coverage run --rcfile=/source/.coveragerc \
            manage.py test --keepdb --noinput forward_netbox.tests && \
            python -m coverage report --rcfile=/source/.coveragerc \
            --fail-under=70"
      - name: Validate validation-org query sync
        env:
          VAL_SRC: ${{ secrets.FORWARD_VALIDATION_SOURCE_NAME }}
          FORWARD_VALIDATION_URL: ${{ secrets.FORWARD_VALIDATION_URL }}
          VAL_USER: ${{ secrets.FORWARD_VALIDATION_USERNAME }}
          VAL_PASS: ${{ secrets.FORWARD_VALIDATION_PASSWORD }}
          VAL_NETID: ${{ secrets.FORWARD_VALIDATION_NETWORK_ID }}
        if: >-
          env.VAL_USER != '' && env.VAL_PASS != '' && env.VAL_NETID != ''
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            exec -T netbox bash -lc \
            "cd /opt/netbox/netbox && \
            source_name=\"${VAL_SRC:-validation-source}\" && \
            validation_url=\"${FORWARD_VALIDATION_URL:-https://fwd.app}\" && \
            python manage.py forward_validation_org_query_audit \
            --source-name \"${source_name}\" \
            --url \"${validation_url}\" \
            --username \"${VAL_USER}\" \
            --password \"${VAL_PASS}\" \
            --network-id \"${VAL_NETID}\" \
            --repository org \
            --directory /forward_netbox_validation/ \
            --fail-on-gap"
      - name: Build release artifacts
        run: python -m build
      - name: Show container logs on failure
        if: failure()
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            logs --no-color netbox
          docker compose --project-name forward-netbox \
            --project-directory development \
            logs --no-color netbox-worker
      - name: Stop NetBox development stack
        if: always()
        run: |
          docker compose --project-name forward-netbox \
            --project-directory development \
            down -v
