name: Publish release
# Tag-triggered release pipeline using PyPI Trusted Publishing (OIDC) — no API
# token is stored anywhere. Publishing v* builds the sdist + wheel and uploads
# them with PEP 740 provenance attestations.
#
# One-time setup required before the first tag will publish:
#   1. On PyPI: project forward-netbox -> Manage -> Publishing -> add a GitHub
#      Trusted Publisher: owner=forwardnetworks, repo=forward-netbox,
#      workflow=release.yml, environment=pypi.
#   2. In this repo: Settings -> Environments -> create an environment named
#      "pypi".
"on":
  # Trusted Publishing is configured (PyPI publisher + `pypi` environment).
  # Only a version tag can publish; there is no manual gate-bypass route.
  push:
    tags:
      - "v*"
permissions:
  actions: read
  contents: read
  pull-requests: read
  statuses: read
jobs:
  validate:
    name: Validate tagged release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - name: Verify protected main-branch release provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          git fetch --force origin refs/tags/v2.5.11:refs/tags/v2.5.11
          python scripts/verify_release_provenance.py \
            --tag "${GITHUB_REF_NAME}"
      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned UI harness
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Install release validation dependencies
        run: |
          python -m pip install --require-hashes \
            --requirement requirements-release.txt
      - name: Verify tag equals package version
        run: |
          package_version="$(
            python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as pyproject:
              data = tomllib.load(pyproject)
          print(data["tool"]["poetry"]["version"])
          PY
          )"
          test "${GITHUB_REF_NAME}" = "v${package_version}"
      - name: Require final-tree release authorization evidence
        run: |
          python scripts/check_release_authorization.py \
            --version "${GITHUB_REF_NAME#v}"
      - name: Audit pinned runtime dependencies
        run: pip-audit --progress-spinner off -r constraints.txt
      - name: Run exact release gate
        env:
          FORWARD_SENSITIVE_PATTERNS: ${{ secrets.FORWARD_SENSITIVE_PATTERNS }}
          FORWARD_SENSITIVE_BINARY_HISTORY_ALLOWLIST: >-
            ${{ secrets.FORWARD_SENSITIVE_BINARY_HISTORY_ALLOWLIST }}
          FORWARD_SENSITIVE_HISTORY_BASELINE: >-
            ${{ vars.FORWARD_SENSITIVE_HISTORY_BASELINE }}
        run: |
          python scripts/check_sensitive_content.py --git-files \
            --protected-history --require-env-patterns --require-baseline-env
          python -m invoke ci
  build:
    name: Build distribution
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - name: Build sdist and wheel
        run: |
          python -m pip install --require-hashes \
            --requirement requirements-release.txt
          python scripts/build_reproducible_distribution.py
          python -m twine check dist/*
      - name: Validate installed wheel on exact runtime
        run: python -m invoke artifact-test
      - name: Upload distribution artifacts
        # actions/upload-artifact v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/
      - name: Upload SBOM
        # actions/upload-artifact v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom
          path: sbom/
  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/forward-netbox/
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - name: Download distribution artifacts
        # actions/download-artifact v4
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        # pypa/gh-action-pypi-publish release/v1
        # yamllint disable rule:line-length
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        # yamllint enable rule:line-length
  github-release:
    name: Publish identical GitHub release artifacts
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download tested distribution artifacts
        # actions/download-artifact v4
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/
      - name: Download installed-runtime SBOM
        # actions/download-artifact v4
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: sbom
          path: sbom/
      - name: Create immutable GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* sbom/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag \
            --generate-notes
