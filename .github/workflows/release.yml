name: Publish to PyPI
# Tag-triggered release pipeline using PyPI Trusted Publishing (OIDC) — no API
# token is stored anywhere. Publishing v* builds the sdist + wheel and uploads
# them with PEP 740 provenance attestations.
#
# One-time setup required before the first tag will publish:
#   1. On PyPI: project forward-netbox -> Manage -> Publishing -> add a GitHub
#      Trusted Publisher: owner=forwardnetworks, repo=forward-netbox,
#      workflow=release.yml, environment=pypi.
#   2. In this repo: Settings -> Environments -> create an environment named
#      "pypi" (optionally add required reviewers to gate publishes).
"on":
  push:
    tags:
      - "v*"
permissions:
  contents: read
jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/forward-netbox/
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
