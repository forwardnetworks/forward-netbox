{% load form_helpers %}
{% load i18n %}
<form action="{{ form_url }}" method="post">
  {% csrf_token %}

  <div class="modal-header">
    <h5 class="modal-title">{% trans "Force Allow Validation Run" %}</h5>
  </div>
  <div class="modal-body">
    {% blocktrans %}
      <p>This records a break-glass override for {{ object_type }} <strong>{{ object }}</strong> and marks the blocked validation run as accepted.</p>
    {% endblocktrans %}
    {% render_form form %}
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">{% trans "Cancel" %}</button>
    <button type="submit" class="btn btn-danger">{% trans "Force allow" %}</button>
  </div>
</form>
