{% load static %}
{% load i18n %}
{% comment %}
Forward Integration for NetBox brand bar. Self-contained, theme-aware (logo wordmark
uses currentColor), no global NetBox style overrides. ff3506 is Forward's accent.
{% endcomment %}
<style>
.fwd-brand-bar{display:flex;align-items:center;gap:.55rem;padding:.35rem .7rem;margin-bottom:1rem;border-left:3px solid #ff3506;border-radius:4px;background:rgba(255,53,6,.05);}
.fwd-brand-bar .fwd-logo{height:15px;width:auto;display:block;}
.fwd-brand-bar .fwd-name{font-weight:600;font-size:.8rem;letter-spacing:.01em;}
.fwd-brand-bar .fwd-tag{font-size:.72rem;opacity:.6;margin-left:auto;}
</style>
<div class="fwd-brand-bar" title="Forward Integration for NetBox">
  <img class="fwd-logo" src="{% static 'forward_netbox/img/fn-logo.svg' %}" alt="Forward">
  <span class="fwd-name">{% trans "Forward" %}</span>
  <span class="fwd-tag">{% trans "Forward Networks · NetBox" %}</span>
</div>
