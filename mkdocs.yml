site_name: Forward Field Integration Documentation
# Internal maintainer/field material is kept in the repo but NEVER published.
# 03_Plans holds field-engagement planning notes; 00_Project_Knowledge holds
# internal architecture/agent-workflow docs. Excluding them from the build (not
# just the nav) keeps them out of the rendered site/.
exclude_docs: |
  03_Plans/
  00_Project_Knowledge/
theme:
  name: material
plugins:
  - awesome-pages:
      filename: .pages.yml
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - mdx_truly_sane_lists
  - smarty
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.smartsymbols
  - pymdownx.tilde
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
